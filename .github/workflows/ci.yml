name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -p "test_*.py"

  installer:
    name: Windows installer contracts
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: ./tests/test_installer_client_registration.ps1
      - shell: pwsh
        run: ./tests/test_installer_skill.ps1
      - shell: pwsh
        run: ./tests/test_installer_targets_and_mcpb.ps1

  package:
    name: Package and schema verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python scripts/build_skill_package.py --output-dir dist
      - run: python -m unittest discover -s tests -p "test_blender_extension_package.py"
      - run: python -m unittest discover -s tests -p "test_skill_package.py"
