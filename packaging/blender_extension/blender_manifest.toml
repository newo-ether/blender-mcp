schema_version = "1.0.0"

id = "blender_mcp"
version = "1.10.0"
name = "Blender MCP"
tagline = "Connect Blender to Model Context Protocol clients"
maintainer = "BlenderMCP Contributors"
type = "add-on"

website = "https://github.com/newo-ether/blender-mcp"
tags = ["User Interface"]

blender_version_min = "4.2.0"
license = ["SPDX:MIT"]
copyright = ["2025 Siddharth Ahuja"]

[permissions]
network = "Connect to MCP clients and optional asset services"
files = "Import and export user-selected assets and data"

[build]
paths = [
  "__init__.py",
  "blender_mcp_addon_runtime.py",
  "LICENSE",
  "schemas/geometry-nodes-index-v1.json",
  "schemas/geometry-nodes-patch-application-v1.json",
  "schemas/geometry-nodes-patch-v1.json",
  "schemas/geometry-nodes-patch-validation-v1.json",
  "schemas/geometry-nodes-v1.json",
  "schemas/node-tree-index-v1.json",
  "schemas/node-tree-patch-application-v1.json",
  "schemas/node-tree-patch-v1.json",
  "schemas/node-tree-patch-validation-v1.json",
  "schemas/node-tree-v1.json",
  "schemas/node-type-schema-v1.json",
]
